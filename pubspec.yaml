name: note_flow
description: NoteFlow – A modern Notes App with Cloud Sync
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  google_sign_in: ^6.2.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.8.1

  # UI / Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1

  # Media
  image_picker: ^1.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  equatable: ^2.0.7
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.3
  fluttertoast: ^8.2.12
  share_plus: ^10.1.4
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - .env
